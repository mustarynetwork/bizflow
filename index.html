<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BizFlow Login</title>
<style>
body{margin:0;padding:20px;font-family:Arial,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border-radius:16px;padding:40px;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.1)}
h2{margin:0 0 6px;font-size:24px;color:#1a1a2e}
p{margin:0 0 24px;color:#666;font-size:14px}
label{display:block;font-size:12px;font-weight:bold;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
input[type=password]{width:100%;padding:12px 14px;border:2px solid #ddd;border-radius:8px;font-size:15px;outline:none;box-sizing:border-box;margin-bottom:16px}
input[type=password]:focus{border-color:#4f46e5}
button{width:100%;padding:13px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer}
button:hover{background:#4338ca}
.msg{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
.msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block}
.msg.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;display:block}
.hint{margin-top:20px;font-size:12px;color:#888;text-align:center;line-height:1.6}
.hint b{color:#4f46e5}
</style>
</head>
<body>
<div class="box">
  <h2>&#128230; BizFlow</h2>
  <p>Business Management System</p>
  <label>Password</label>
  <input type="password" id="pw" placeholder="Enter password"/>
  <button id="loginBtn">Login &#8594;</button>
  <div class="msg" id="msg"></div>
  <div class="hint">Super: <b>super123</b> &nbsp;|&nbsp; Admin: <b>admin123</b></div>
</div>

<script>
// Simple direct login — no external files needed
document.getElementById('loginBtn').addEventListener('click', function() {
  var pw      = document.getElementById('pw').value;
  var msgEl   = document.getElementById('msg');
  var superPw = localStorage.getItem('bf_pw_super') || 'super123';
  var adminPw = localStorage.getItem('bf_pw_admin') || 'admin123';

  msgEl.className = 'msg';
  msgEl.style.display = 'none';

  if (!pw) {
    msgEl.className = 'msg error';
    msgEl.textContent = 'Please enter your password.';
    return;
  }

  if (pw === superPw) {
    sessionStorage.setItem('bf_session', JSON.stringify({role:'super', loginTime: Date.now()}));
    msgEl.className = 'msg info';
    msgEl.textContent = 'Login successful! Redirecting...';
    setTimeout(function(){ window.location.href = 'dashboard.html'; }, 800);
  } else if (pw === adminPw) {
    sessionStorage.setItem('bf_session', JSON.stringify({role:'admin', loginTime: Date.now()}));
    msgEl.className = 'msg info';
    msgEl.textContent = 'Login successful! Redirecting...';
    setTimeout(function(){ window.location.href = 'dashboard.html'; }, 800);
  } else {
    msgEl.className = 'msg error';
    msgEl.textContent = 'Wrong password. Try: super123';
  }
});

// Also allow Enter key
document.getElementById('pw').addEventListener('keypress', function(e) {
  if (e.key === 'Enter' || e.keyCode === 13) {
    document.getElementById('loginBtn').click();
  }
});

// If already logged in go straight to dashboard
try {
  var s = JSON.parse(sessionStorage.getItem('bf_session') || 'null');
  if (s && s.role) { window.location.href = 'dashboard.html'; }
} catch(e) {}
</script>
</body>
</html>
