<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>BizFlow — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{ --ink:#0f172a;--ink2:#475569;--accent:#4f46e5;--accent2:#7c3aed;--border:#e2e8f0;--bg:#f8fafc; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden}
    body::before{content:'';position:absolute;top:-120px;right:-120px;width:480px;height:480px;background:radial-gradient(circle,rgba(79,70,229,.12) 0%,transparent 70%);pointer-events:none}
    body::after{content:'';position:absolute;bottom:-80px;left:-80px;width:360px;height:360px;background:radial-gradient(circle,rgba(124,58,237,.1) 0%,transparent 70%);pointer-events:none}
    .wrap{width:100%;max-width:420px;background:#fff;border-radius:24px;box-shadow:0 4px 40px rgba(79,70,229,.12);padding:44px 40px 40px;position:relative;z-index:1}
    .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:32px}
    .logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--ink)}
    .logo-text span{color:var(--accent)}
    h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;margin-bottom:6px}
    .sub{font-size:14px;color:var(--ink2);margin-bottom:28px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
    .field input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:15px;color:var(--ink);background:var(--bg);outline:none;transition:border-color .2s,box-shadow .2s}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.1);background:#fff}
    .field{margin-bottom:18px}
    .btn-login{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px}
    .btn-login:hover{opacity:.92}
    .btn-login:active{transform:scale(.98)}
    .btn-login:disabled{opacity:.6;cursor:not-allowed}
    .err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
    .hint{font-size:12px;color:var(--ink2);text-align:center;margin-top:20px;line-height:1.6}
    .hint strong{color:var(--accent)}
    .sync-status{font-size:12px;text-align:center;margin-top:14px;color:var(--ink2);min-height:18px}
    .version{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;color:#94a3b8}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <div class="logo-icon">📦</div>
    <div class="logo-text">Biz<span>Flow</span></div>
  </div>
  <h1>স্বাগতম</h1>
  <p class="sub">Business Management System — পাসওয়ার্ড দিয়ে প্রবেশ করুন</p>

  <div class="err" id="err">পাসওয়ার্ড সঠিক নয়। আবার চেষ্টা করুন।</div>

  <div class="field">
    <label>Password / পাসওয়ার্ড</label>
    <input type="password" id="pw" placeholder="Enter your password" autocomplete="current-password"/>
  </div>
  <button class="btn-login" id="btn">প্রবেশ করুন →</button>

  <div class="sync-status" id="sync-msg"></div>

  <div class="hint">
    Default Super → <strong>super123</strong> &nbsp;|&nbsp; Admin → <strong>admin123</strong><br/>
    (Settings থেকে পাসওয়ার্ড পরিবর্তন করুন)
  </div>
</div>
<div class="version">BizFlow v1.1 · Google Sheets powered</div>

<script src="shared.js"></script>
<script>
  if (BF.session) window.location.href = 'dashboard.html';

  const redirect = new URLSearchParams(window.location.search).get('redirect') || 'dashboard.html';
  const btn      = document.getElementById('btn');
  const err      = document.getElementById('err');
  const syncMsg  = document.getElementById('sync-msg');

  btn.addEventListener('click', doLogin);
  document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

  async function doLogin() {
    const pw = document.getElementById('pw').value.trim();
    err.style.display = 'none';
    if (!pw) { err.textContent = 'পাসওয়ার্ড লিখুন।'; err.style.display = 'block'; return; }

    btn.innerHTML = '<span class="spin"></span> যাচাই হচ্ছে…';
    btn.disabled  = true;

    // If Sheet URL is set, first pull latest config (passwords) from Sheet
    // so logins always reflect what super admin set
    if (BF.sheetUrl) {
      try {
        const config = await API.get('getConfig');
        if (config && !config.error) {
          if (config.pw_super) { localStorage.setItem('bf_pw_super', config.pw_super); BF.roles.super = config.pw_super; }
          if (config.pw_admin) { localStorage.setItem('bf_pw_admin', config.pw_admin); BF.roles.admin = config.pw_admin; }
        }
      } catch(e) { /* use cached passwords if Sheet unreachable */ }
    }

    const role = Auth.login(pw);
    if (!role) {
      err.style.display = 'block';
      btn.innerHTML = 'প্রবেশ করুন →';
      btn.disabled  = false;
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
      return;
    }

    // Sync all data from Sheet after successful login
    if (BF.sheetUrl) {
      syncMsg.textContent = '⟳ ডেটা সিঙ্ক হচ্ছে…';
      await API.syncAllData(msg => syncMsg.textContent = msg);
      syncMsg.textContent = '✓ সিঙ্ক সম্পন্ন';
    }

    window.location.href = redirect;
  }
</script>
</body>
</html>
